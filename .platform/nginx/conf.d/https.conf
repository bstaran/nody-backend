# For WebSocket support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Main HTTPS server configuration for Amazon Linux 2023
server {
    listen 443 ssl http2;
    server_name _;

    # SSL Certificates (from pre-deploy hook)
    ssl_certificate /etc/pki/tls/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/pki/tls/private/cloudflare-origin-key.pem;

    # Cloudflare Authenticated Origin Pulls
    ssl_client_certificate /etc/pki/tls/certs/cloudflare-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # SSL Protocols and Ciphers (Security Hardening)
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:5m;
    ssl_session_timeout 5m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; frame-ancestors 'self';" always;

    # Gzip Compression
    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy to the Docker container
    location / {
        proxy_pass          http://docker;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://docker/actuator/health;
        proxy_set_header Host $host;
        access_log off;
    }
}

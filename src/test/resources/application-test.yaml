spring:
  web:
    resources:
      static-locations: classpath:/static/
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: false
    generate-ddl: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        hbm2ddl:
          auto: create-drop
  test:
    database:
      replace: none
    mockmvc:
      print: none
  main:
    lazy-initialization: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID:test-client-id}
            client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:test-client-secret}
            scope:
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

oauth2:
  redirect:
    url: https://api.nodyy.com/oauth/callback
    allowed-domains: https://api.nodyy.com
    allowed-redirect-hosts: nodyy

cors:
  allowed-origins: https://api.nodyy.com

jwt:
  secret-key: ${JWT_SECRET_KEY:dGVzdFNlY3JldEtleUZvclRlc3RpbmdPbmx5TWluaW11bTI1NkJpdHNMb25nU2VjcmV0S2V5Rm9ySlRUZXN0aW5nUHVycG9zZXNPbmx5}
  access-token-expiration-minutes: 15
  refresh-token-expiration-days: 7

springdoc:
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.json
    display-request-duration: true
    groups-order: DESC
    operations-sorter: alpha
  api-docs:
    path: /api-docs
  show-actuator: true
